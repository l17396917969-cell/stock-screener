<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 量化审计系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#0066CC", secondary: "#0099AA", base: "#EFF6FF", card: "#FFFFFF" }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 flex items-center justify-center min-h-screen font-['Inter'] m-0">
    <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8 text-2xl font-bold text-gray-800">
            量化审计<span class="text-primary ml-1">PRO</span>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="mb-6 space-y-2">
              {% for message in messages %}
                <li class="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm text-center font-medium">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-6">
            <div>
                <label for="username" class="block mb-2 text-sm font-medium text-gray-700">用户名</label>
                <input type="text" id="username" name="username" required autofocus 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow text-gray-900">
            </div>
            <div>
                <label for="password" class="block mb-2 text-sm font-medium text-gray-700">密码</label>
                <input type="password" id="password" name="password" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow text-gray-900">
            </div>
            <button type="submit" 
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-base font-semibold transition-colors shadow-sm">
                登录
            </button>
        </form>

        <div class="text-center mt-8 text-xs text-gray-500">
            由管理员开通账号，请联系技术支持。
        </div>
    </div>
</body>
</html>
